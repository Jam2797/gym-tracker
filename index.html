<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>GYM TRACKER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Montserrat:wght@400;600;700&display=swap');
:root{--bg:#080808;--s:#111;--c:#161616;--b:#252525;--him:#7c3aed;--himl:#a78bfa;--himd:#1e1030;--her:#db2777;--herl:#f472b6;--herd:#2d0a1a;--g:#10b981;--gd:#052e1c;--y:#f59e0b;--r:#ef4444;--t:#f0f0f0;--m:#555;--m2:#888;--ac:var(--him);--acl:var(--himl);--acd:var(--himd)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t);font-family:'Montserrat',sans-serif;min-height:100vh;overflow-x:hidden}
.nav{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:54px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(135deg,var(--himl),var(--herl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.utabs{display:flex;gap:4px;background:var(--s);border-radius:10px;padding:4px}
.utab{padding:5px 14px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;color:var(--m2);text-transform:uppercase;transition:all .2s}
.utab.him.a{background:var(--him);color:#fff}.utab.her.a{background:var(--her);color:#fff}
.page{display:none;padding:12px 14px 100px}.page.a{display:block}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.97);backdrop-filter:blur(20px);border-top:1px solid var(--b);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 1px;cursor:pointer;color:var(--m);font-size:7px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;gap:3px;transition:color .2s}
.bni.a{color:var(--ac)}.bni svg{width:18px;height:18px}
.sec{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--m2);margin:18px 0 10px}.sec:first-child{margin-top:4px}
.card{background:var(--c);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:10px}.cp{padding:14px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.bg-him{background:var(--himd);color:var(--himl)}.bg-her{background:var(--herd);color:var(--herl)}
.bg-g{background:var(--gd);color:#6ee7b7}.bg-y{background:#2a1800;color:#fbbf24}.bg-r{background:#2a0000;color:#f87171}.bg-x{background:#222;color:var(--m2)}
.btn{width:100%;padding:11px;border-radius:9px;border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}.btn:active{opacity:.7}
.btn-him{background:var(--him);color:#fff}.btn-her{background:var(--her);color:#fff}.btn-grad{background:linear-gradient(135deg,var(--him),var(--her));color:#fff}
.inp{background:var(--s);border:1px solid var(--b);border-radius:7px;color:var(--t);padding:8px 10px;font-size:14px;font-family:'DM Mono',monospace;outline:none;-webkit-appearance:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:var(--ac)}.lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--m);margin-bottom:3px;display:block}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.day-hdr{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer}
.day-hdr.him-g{background:linear-gradient(90deg,var(--himd),transparent)}.day-hdr.her-g{background:linear-gradient(90deg,var(--herd),transparent)}
.day-num{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;opacity:.28}
.day-num.him{color:var(--himl)}.day-num.her{color:var(--herl)}
.day-meta h3{font-size:14px;font-weight:700}.day-meta p{font-size:11px;color:var(--m2);margin-top:2px}
.tog{margin-left:auto;width:26px;height:26px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;transition:transform .3s;flex-shrink:0}.tog svg{width:13px;height:13px}
.open .tog{transform:rotate(180deg)}.day-body{display:none;padding:0 13px 13px}.open .day-body{display:block}
.ex-block{margin-top:10px;border:1px solid var(--b);border-radius:10px;overflow:hidden}
.ex-title{padding:8px 12px;font-size:11px;font-weight:700;background:#1e1e1e;display:flex;gap:6px;align-items:center}
.ex-title.him{border-left:3px solid var(--him)}.ex-title.her{border-left:3px solid var(--her)}
.ex-row{border-bottom:1px solid #181818}.ex-row:last-child{border-bottom:none}
.ex-main{display:flex;align-items:center;padding:11px 12px;cursor:pointer;gap:9px}
.ex-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.ex-ico.him{background:var(--himd)}.ex-ico.her{background:var(--herd)}
.ex-info{flex:1;min-width:0}.ex-name{font-size:13px;font-weight:600}.ex-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.ex-arr{width:17px;height:17px;flex-shrink:0;color:var(--m);transition:transform .3s,color .2s}
.ex-open .ex-arr{transform:rotate(180deg);color:var(--ac)}
.ex-detail{display:none;background:#0d0d0d;border-top:1px solid var(--b)}.ex-open .ex-detail{display:block}
.ex-svg{padding:14px;text-align:center;background:#0a0a0a;border-bottom:1px solid var(--b)}
.ex-tips{padding:10px 12px;border-bottom:1px solid var(--b)}
.ex-tip{display:flex;gap:7px;padding:4px 0;font-size:12px;color:var(--m2);line-height:1.5}
.ex-tip::before{content:"→";color:var(--ac);font-weight:700;flex-shrink:0}
.ex-log{padding:11px 12px}
.ex-restrict{padding:9px 12px;background:#1f1200;font-size:11px;color:#fbbf24;border-bottom:1px solid var(--b)}
.sug{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.sug.g{background:var(--gd);color:#6ee7b7}.sug.y{background:#2a1800;color:#fbbf24}.sug.r{background:#2a0000;color:#f87171}.sug.n{background:#222;color:var(--m2)}
.deload-banner{padding:11px 13px;background:#1a0800;border-radius:10px;font-size:12px;color:#fb923c;border-left:3px solid #f97316;margin-bottom:12px}
.stats4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:12px}
.stat .v{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.stat .l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:4px}.stat .sub{font-size:10px;color:var(--m2);margin-top:2px}
.v.him{color:var(--himl)}.v.her{color:var(--herl)}.v.g{color:var(--g)}
.pb-item{margin-bottom:12px}.pb-hdr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.pb-name{font-weight:600}.pb-val{color:var(--m2);font-family:'DM Mono',monospace}
.pb{height:5px;background:var(--s);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;border-radius:99px;transition:width .8s}
.pb-fill.him{background:linear-gradient(90deg,var(--him),var(--himl))}.pb-fill.her{background:linear-gradient(90deg,var(--her),var(--herl))}
.ana-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--b);font-size:12px;color:var(--m2);line-height:1.5}
.ana-item:last-child{border-bottom:none}.dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dot.g{background:var(--g)}.dot.y{background:var(--y)}.dot.r{background:var(--r)}
.mac3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.mac{background:var(--s);border-radius:8px;padding:9px;text-align:center}
.mac .mv{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}.mac .ml{font-size:9px;color:var(--m2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.meal-item{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:var(--s);border-radius:7px;font-size:11px;gap:8px;margin-bottom:5px}
.mi-n{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.mi-del{color:var(--m);cursor:pointer;padding:2px 5px;font-size:15px;flex-shrink:0}
.water-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wbtn{padding:6px 12px;background:var(--s);border:1px solid var(--b);border-radius:7px;color:var(--t);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace}.wbtn:active{background:var(--b)}
.field-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.field-row label{font-size:12px;color:var(--m2);width:100px;flex-shrink:0}.field-row .inp{flex:1}
.act-btn{width:100%;padding:11px 13px;background:var(--c);border:1px solid var(--b);border-radius:10px;display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;text-align:left}.act-btn:active{background:var(--s)}
.act-ico{font-size:22px;flex-shrink:0}.act-name{font-size:13px;font-weight:700}.act-sub{font-size:11px;color:var(--m2);margin-top:1px}
.act-log-form{background:var(--c);border:1px solid var(--b);border-radius:11px;padding:14px;margin-bottom:10px;display:none}
.rest-ov{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s);border:1px solid var(--b);border-radius:14px;padding:12px 20px;z-index:999;display:none;align-items:center;gap:14px;box-shadow:0 4px 30px rgba(0,0,0,.7)}
.rest-ov.show{display:flex}.rt-n{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;transition:color .5s}
.rt-lbl{font-size:9px;color:var(--m2);text-transform:uppercase;letter-spacing:1px}
.rt-skip{padding:7px 13px;background:var(--b);border:none;border-radius:7px;color:var(--m2);font-size:11px;cursor:pointer}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(10px);padding:8px 18px;border-radius:99px;font-size:12px;font-weight:700;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none;color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
canvas{width:100%!important;display:block}
.sel{width:100%;background:var(--s);border:1px solid var(--b);border-radius:7px;color:var(--t);padding:7px 10px;font-size:11px;outline:none;-webkit-appearance:none;font-family:'Montserrat',sans-serif;margin-bottom:11px}
.phase-info{padding:10px 13px;background:var(--gd);border-radius:9px;font-size:12px;color:#6ee7b7;margin-bottom:12px;border-left:2px solid var(--g)}
.injury-note{padding:10px 13px;background:#1f1200;border-radius:9px;font-size:12px;color:#fbbf24;border-left:3px solid var(--y);margin-bottom:12px}
.sec-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--s);border-radius:9px;padding:3px;overflow-x:auto}
.sec-tab{flex-shrink:0;padding:6px 10px;border-radius:7px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;text-align:center;cursor:pointer;color:var(--m2);transition:all .2s}.sec-tab.a{background:var(--ac);color:#fff}
.pane{display:none}.pane.a{display:block}
.cycle-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:linear-gradient(135deg,var(--him),var(--her));color:#fff;margin-left:8px}
.food-sug:hover{background:var(--b)!important}
.onboard-ov{position:fixed;inset:0;background:rgba(8,8,8,.97);backdrop-filter:blur(10px);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
.onboard-ov.show{display:flex}
.onboard-card{max-width:380px;width:100%;text-align:center}
.onboard-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;background:linear-gradient(135deg,var(--himl),var(--herl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:24px}
.onboard-title{font-size:22px;font-weight:700;margin-bottom:8px}
.onboard-sub{font-size:14px;color:var(--m2);margin-bottom:24px}
.onboard-btn{display:flex;align-items:center;gap:14px;text-align:left;padding:16px;background:var(--c);border:1px solid var(--b);border-radius:12px;margin-bottom:12px;cursor:pointer;transition:border-color .2s}
.onboard-btn:active{border-color:var(--him)}
.ob-emoji{font-size:32px;flex-shrink:0}
.ob-t{font-size:15px;font-weight:700;margin-bottom:3px}
.ob-d{font-size:12px;color:var(--m2);line-height:1.4}
.onboard-skip{margin-top:8px;font-size:13px;color:var(--m);cursor:pointer;padding:8px}
</style>
</head>

var QA=[{"q": "Не чувствую мышцу при упражнении", "a": "Нейромышечная связь развивается со временем. Замедли движение, уменьши вес на 20-30%. Для груди — мысленно сжимай грудь при жиме. Для спины — думай про локти, не про руки. Используй изоляцию перед базовым (предутомление).", "tags": ["чувствую", "мышцу", "связь"]}, {"q": "Болит плечо при жиме", "a": "Стоп, снизь вес. Причины: локти слишком широко (должны 45-75°), нет антагонистической работы (face pull!), перегрузка. Face pull 3x15 в каждую тренировку — обязательно. Острая боль в суставе — к врачу.", "tags": ["болит", "плечо", "жим", "боль"]}, {"q": "Болит поясница при приседе или становой", "a": "Причины: округление спины, слабый кор, слабые бёдра. Снизь вес до техничного. Добавь планку ежедневно. Разминка бёдер 5 мин до упражнения. Острая стреляющая боль — немедленный стоп.", "tags": ["болит", "поясница", "присяд", "становая", "спина"]}, {"q": "Как правильно дышать", "a": "Выдох на усилии (подъём веса), вдох при опускании. При тяжёлых базовых — задержка дыхания на 1-2 сек стабилизирует позвоночник. Не задерживай на весь подход — повышает давление.", "tags": ["дышать", "дыхание"]}, {"q": "Сколько отдыхать между подходами", "a": "Базовые (присед, жим, тяга): 2-3 мин. Изоляция: 60-90 сек. Трекер ставит 90 сек — оптимум. При максимальных весах — до 5 мин. Слишком короткий отдых = меньше повторений в следующем подходе.", "tags": ["отдых", "перерыв", "подходы"]}, {"q": "Вес стоит на месте не худею", "a": "Топ-5 причин: 1) Ешь больше чем думаешь — взвешивай всё 2) Организм адаптировался — пересчитай TDEE 3) Задержка воды при силовых — норма 4) Дефицит недостаточный — нужно -300-500 ккал 5) Недосып — кортизол блокирует жиросжигание.", "tags": ["вес", "не худею", "плато", "похудение"]}, {"q": "Сила не растёт застрял на весе", "a": "Плато решается так: 1) Деload-неделя (60% веса, 3 подхода) — после неё часто рывок 2) Проверь сон: 7-9 часов критично 3) Съедай на 200-300 ккал больше 4) Смени схему: 5x5 вместо 4x10 5) Добавь лёгкий разминочный подход.", "tags": ["сила", "не растёт", "плато", "прогресс"]}, {"q": "Когда будут видны результаты", "a": "Сила ощущается через 2-3 нед. Лучше чувствуешь себя — через 1-2 нед. Видно другим — через 2-3 мес. Большинство бросают на 6-8 неделе — именно тут начинается настоящий прогресс. Делай фото каждые 2 недели.", "tags": ["результаты", "когда", "заметно", "мышцы"]}, {"q": "Сколько белка нужно в день", "a": "Для роста мышц: 1.6-2.2г на кг веса. При 80 кг — 128-176г. Распредели на 4-5 приёмов по 30-40г (столько усваивается за раз). Растительный белок = животный при достаточном количестве.", "tags": ["белок", "протеин", "сколько"]}, {"q": "Что есть до тренировки", "a": "За 1.5-2 часа: белок + углеводы (гречка с курицей, рис+рыба). За 30-60 мин: быстрые углеводы (банан, финики). Жиры замедляют — не ешь много жира перед. Голодным не тренируйся — сила упадёт на 20-30%.", "tags": ["есть", "до", "тренировки", "перед"]}, {"q": "Что есть после тренировки", "a": "В течение 30-60 мин: 30-40г белка + углеводы. Варианты: творог с бананом, курица с рисом, протеин с молоком. Углеводы восполняют гликоген — важно после силовой.", "tags": ["есть", "после", "тренировки"]}, {"q": "Болят мышцы идти ли тренироваться", "a": "Лёгкая крепатура (ноет но двигаться можно) — ИДИ, лёгкая тренировка ускоряет восстановление. Острая боль или ограничение движения — СТОП. Боль в суставе (не мышце) — всегда стоп.", "tags": ["болят", "мышцы", "крепатура", "идти"]}, {"q": "Как часто делать деload", "a": "Каждые 4 недели классика — трекер считает автоматически. Признаки что нужен раньше: сила падает 2+ тренировки подряд, постоянная усталость, суставы болят. Деload — инвестиция: после него обычно рывок.", "tags": ["деload", "деload-неделя", "восстановление"]}, {"q": "Не высыпаюсь что делать с тренировкой", "a": "Сон = когда растут мышцы. При < 7 часов: снижай интенсивность на 20-30%, пропускай тяжёлые базовые. Хронический недосып = высокий кортизол = блокировка роста. Лучше 1 пропуск с нормальным сном.", "tags": ["сон", "не высыпаюсь", "усталость"]}, {"q": "Нужен ли протеиновый коктейль", "a": "Нет, если набираешь норму белка из еды. Протеин — удобный способ добрать, не волшебная добавка. 1 мерная ложка ≈ 25г белка = 100г куриной грудки. Выбирай то, что удобнее.", "tags": ["протеин", "коктейль", "добавки"]}, {"q": "Нужно ли кардио", "a": "Для здоровья — да, 2-3 раза/нед по 20-30 мин. Для похудения — помогает, но диета важнее. Для роста мышц — умеренное не мешает. Оптимум: лёгкое кардио в дни отдыха между силовыми.", "tags": ["кардио", "бег"]}, {"q": "Как убрать живот", "a": "Локальное похудение — миф. Пресс виден при снижении % жира по всему телу. Дефицит калорий — главный инструмент. Укрепляй пресс (планка, скручивания) для осанки и силы кора, но не для сжигания жира на животе.", "tags": ["живот", "убрать", "пресс", "жир"]}, {"q": "Разминка перед тренировкой", "a": "5 мин общая: суставная гимнастика (вращения плечами, бёдрами, коленями), лёгкое кардио. Затем специфическая: 40% рабочего веса × 10, потом 60% × 5 — и только потом рабочий подход. Без разминки риск травмы × 3.", "tags": ["разминка", "перед", "прогрев"]}, {"q": "Можно ли похудеть и накачать одновременно", "a": "Да, это рекомпозиция — лучше работает у новичков (первые 12-18 мес). Небольшой дефицит -200 ккал + высокий белок 2.2г/кг + силовые тренировки. Опытным атлетам эффективнее чередовать циклы массы и сушки.", "tags": ["похудеть", "накачать", "одновременно", "рекомпозиция"]}, {"q": "Как избежать травмы", "a": "5 правил: 1) Разминка всегда 2) Техника важнее веса — лучше 50кг правильно чем 80кг криво 3) Не увеличивай нагрузку больше 5-10%/нед 4) Деload каждые 4 недели 5) Боль в суставе = СТОП. Большинство травм от спешки с весом.", "tags": ["травма", "безопасность", "боль"]}];

function getD(){try{var r=localStorage.getItem('gym_v6');return r?JSON.parse(r):{logs:{},profile:{him:{},her:{}},food:{},acts:[],notes:{},meas:{him:[],her:[]},prs:{him:{},her:{}}};}catch(e){return{logs:{},profile:{him:{},her:{}},food:{},acts:[],notes:{},meas:{him:[],her:[]},prs:{him:{},her:{}}};}}
function setD(d){try{localStorage.setItem('gym_v6',JSON.stringify(d));}catch(e){}}
function today(){return new Date().toISOString().slice(0,10);}
function getLogs(user,exId){var d=getD(),k=user+'_'+exId;return(d.logs[k]||[]).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});}
function addLog(user,exId,weight,reps,sets){
  var d=getD(),k=user+'_'+exId;
  if(!d.logs[k])d.logs[k]=[];
  var w=parseFloat(weight)||0,r=parseInt(reps)||0,s=parseInt(sets)||3;
  d.logs[k].push({date:today(),weight:w,reps:r,sets:s});
  // Check PR
  if(!d.prs)d.prs={him:{},her:{}};
  if(!d.prs[user])d.prs[user]={};
  var prev=d.prs[user][exId];
  if(!prev||w>prev.weight){d.prs[user][exId]={weight:w,date:today(),reps:r};}
  setD(d);
  return(!prev||w>prev.weight)&&w>0;
}
function delLog(user,exId,idx){var d=getD(),k=user+'_'+exId;if(d.logs[k]){d.logs[k].splice(idx,1);setD(d);}}
function totalSessions(user){var d=getD(),dates={},pf=user+'_';Object.keys(d.logs||{}).forEach(function(k){if(k.indexOf(pf)!==0)return;(d.logs[k]||[]).forEach(function(l){dates[l.date]=1;});});return Object.keys(dates).length;}
function getLevel(){var d=getD();return d.level||'experienced';}
function getPhaseIdx(user){var n=totalSessions(user),ph=PHASES[user];var off=(getLevel()==='beginner')?12:0;for(var i=0;i<ph.length;i++){var lo=(i===0)?0:(ph[i].sessions[0]+off);var hi=ph[i].sessions[1]+off;if(n>=lo&&n<=hi)return i;}return ph.length-1;}
function getPhase(user){return PHASES[user][getPhaseIdx(user)];}
function getCycle(user){return Math.floor(getPhaseIdx(user)/3)+1;}
function getWeekNum(user){return Math.floor(totalSessions(user)/3);}
function isDeloadWeek(user){var w=getWeekNum(user);return w>0&&(w%4===3);}
function daysSince(user){var d=getD(),pf=user+'_',last='';Object.keys(d.logs||{}).forEach(function(k){if(k.indexOf(pf)!==0)return;(d.logs[k]||[]).forEach(function(l){if(l.date>last)last=l.date;});});if(!last)return 0;return Math.floor((Date.now()-new Date(last).getTime())/86400000);}
function getDeload(user){
  var days=daysSince(user),deload=isDeloadWeek(user);
  if(deload)return{f:0.6,type:'planned',msg:'📅 ДЕLOAD-НЕДЕЛЯ (каждая 4-я). 60% весов, 3 подхода. Восстановление для следующего рывка.'};
  if(days>13)return{f:0.7,type:'break',msg:'⏸ Перерыв '+days+' дн → -30% к весу. Осторожное восстановление.'};
  if(days>6)return{f:0.8,type:'break',msg:'⏸ Перерыв '+days+' дн → -20% к весу. Деload-неделя.'};
  if(days>3)return{f:0.9,type:'break',msg:'⏸ Перерыв '+days+' дн → -10% к весу.'};
  return{f:1.0,type:'normal',msg:null};
}
function rotSuggest(user,exId){
  var n=totalSessions(user);
  if(n<18||n%18!==0)return null;
  var alts=EX_ROTATE[exId];if(!alts||!alts.length)return null;
  var idx=Math.floor(n/18)%alts.length;
  var altId=alts[idx];
  return EX[altId]?EX[altId].n:null;
}
function getSug(user,exId){
  var ex=EX[exId];if(!ex)return{w:0,label:'',cls:'n'};
  var dl=getDeload(user);
  var logs=getLogs(user,exId);
  if(!logs.length){var sw=ex.dw;if(getLevel()==='beginner'&&ex.dw>0)sw=Math.round(ex.dw*0.85/2.5)*2.5;return{w:sw,label:'Старт',cls:'n'};}
  var last=logs[0];
  var baseW;
  var targetMet=last.sets>=ex.ts&&last.reps>=ex.tr;
  var two=logs.length>=2&&logs[1].sets>=ex.ts&&logs[1].reps>=ex.tr;
  if(targetMet){
    if(two&&ex.inc>0){baseW=last.weight+ex.inc;var lbl='+'+ex.inc+'кг!';}
    else{baseW=last.weight;var lbl=ex.inc>0?'Ещё раз':'Отлично';}
    var cls=two?'g':'y';
  } else if(last.reps<ex.tr-3&&last.weight>ex.dw){
    baseW=Math.max(ex.dw,last.weight-ex.inc);var lbl='Снизь';var cls='r';
  } else {
    baseW=last.weight;var lbl='Держи';var cls='y';
  }
  var deloadSets=isDeloadWeek(user)?3:ex.ts;
  var fw=Math.round(baseW*dl.f*2)/2;
  if(dl.f<1){lbl='Деload';cls='r';}
  return{w:fw,label:lbl,cls:cls,sets:deloadSets};
}

function buildAna(allLogs,totalDays){
  if(!allLogs.length)return'<div style="text-align:center;padding:30px;color:var(--m)">🧠 Нет данных. Начни тренироваться!</div>';
  var items=[],now=new Date();
  var allDates=[];allLogs.forEach(function(l){if(allDates.indexOf(l.date)<0)allDates.push(l.date);});allDates.sort();
  var d30=allDates.filter(function(dt){return new Date(dt)>new Date(now-30*864e5);}).length;
  if(d30>=10)items.push({c:'g',t:'Отличная частота: '+d30+' тренировок за 30 дней!'});
  else if(d30>=6)items.push({c:'y',t:d30+' тренировок за 30 дней. Цель — 12.'});
  else items.push({c:'r',t:'Только '+d30+' тренировок за 30 дней. Нужна регулярность — 3 раза/нед.'});
  var dg=allDates.length?Math.floor((now-new Date(allDates[allDates.length-1]))/864e5):99;
  var dl=getDeload(CU);
  if(dg<=1)items.push({c:'g',t:'Последняя тренировка '+(dg===0?'сегодня':'вчера')+' 🔥'});
  else if(dg<=3)items.push({c:'y',t:'Последняя тренировка '+dg+' дня назад.'});
  else items.push({c:'r',t:dl.msg||('Перерыв '+dg+' дней.')});
  var byEx={};allLogs.forEach(function(l){if(!byEx[l.exId])byEx[l.exId]=[];byEx[l.exId].push(l);});
  var prog=0,stuck=0;
  Object.keys(byEx).forEach(function(k){var logs2=byEx[k];if(logs2.length<3)return;var sorted=logs2.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});var h2=Math.ceil(sorted.length/2);var af=sorted.slice(0,h2).reduce(function(s,l){return s+(l.weight||0);},0)/h2;var al=sorted.slice(h2).reduce(function(s,l){return s+(l.weight||0);},0)/(sorted.length-h2||1);if(al>af*1.04)prog++;else if(al<=af)stuck++;});
  if(prog>0)items.push({c:'g',t:'Прогрессия в '+prog+' упражнении!'});
  if(stuck>0)items.push({c:'y',t:'Вес стагнирует в '+stuck+' упражнении. Попробуй +2.5кг или деload.'});
  var phase=getPhase(CU),phIdx=getPhaseIdx(CU),cycle=getCycle(CU);

  var recs=[];
  if(dg>=4)recs.push({c:'r',t:'Запланируй тренировку! 4+ дней без нагрузки замедляет прогресс.'});
  Object.keys(byEx).slice(0,4).forEach(function(k){var logs2=byEx[k];var last=logs2[logs2.length-1];var ex=EX[k];if(last&&ex&&last.reps>=ex.tr&&last.sets>=ex.ts)recs.push({c:'g',t:ex.n+': выполнил всё — следующий раз +'+ex.inc+'кг!'});});

    {c:'y',t:'4-6 дней: -10% к предложенному весу.'},
    {c:'y',t:'7-13 дней: -20%. Деload-неделя — восстановление техники.'},

    {c:'g',t:'После 3 фаз (Цикл 2): программа с более сложными упражнениями, веса от твоих лучших результатов.'}
  ];

function drawLine(exId,acl,acf){
  var canvas=document.getElementById('progC');if(!canvas)return;
  var d=getD(),k=CU+'_'+exId;
  var logs2=(d.logs[k]||[]).slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var weights=logs2.map(function(l){return l.weight;}),labels=logs2.map(function(l){return l.date;});
  if(!weights.length){canvas.style.display='none';return;}
  canvas.style.display='block';
  var W=canvas.offsetWidth||300,H=150;canvas.width=W;canvas.height=H;
  var p={t:15,r:15,b:28,l:36},cw=W-p.l-p.r,ch=H-p.t-p.b;
  var max=Math.max.apply(null,weights)*1.1||10,min=Math.min.apply(null,weights)*0.9||0,range=max-min||1;
  var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=p.t+(ch/4)*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();ctx.fillStyle='#555';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText(Math.round(max-(range/4)*i),p.l-3,y+3);}
  if(weights.length<2){var x0=p.l+cw/2,y0=p.t+ch-((weights[0]-min)/range)*ch;ctx.beginPath();ctx.arc(x0,y0,5,0,Math.PI*2);ctx.fillStyle=acl;ctx.fill();return;}
  ctx.beginPath();weights.forEach(function(v,i){var x=p.l+(i/(weights.length-1))*cw,y=p.t+ch-((v-min)/range)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.lineTo(p.l+cw,p.t+ch);ctx.lineTo(p.l,p.t+ch);ctx.closePath();ctx.fillStyle=acf;ctx.fill();
  ctx.beginPath();ctx.strokeStyle=acl;ctx.lineWidth=2.5;ctx.lineJoin='round';weights.forEach(function(v,i){var x=p.l+(i/(weights.length-1))*cw,y=p.t+ch-((v-min)/range)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  weights.forEach(function(v,i){var x=p.l+(i/(weights.length-1))*cw,y=p.t+ch-((v-min)/range)*ch;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=acl;ctx.fill();ctx.strokeStyle='#0d0d0d';ctx.lineWidth=1.5;ctx.stroke();});
  ctx.fillStyle='#555';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText(labels[0],p.l,H-4);ctx.textAlign='right';ctx.fillText(labels[labels.length-1],p.l+cw,H-4);
}
function drawWeek(allLogs,acl){
  var canvas=document.getElementById('weekC');if(!canvas)return;
  var weeks={};allLogs.forEach(function(l){var dt=new Date(l.date);var wk=dt.getFullYear()+'-W'+Math.ceil((dt.getDate()+new Date(dt.getFullYear(),dt.getMonth(),1).getDay())/7);weeks[wk]=(weeks[wk]||0)+1;});
  var labels=Object.keys(weeks).sort().slice(-10),vals=labels.map(function(w){return weeks[w];});
  if(!labels.length)return;
  var W=canvas.offsetWidth||300,H=90;canvas.width=W;canvas.height=H;
  var max=Math.max.apply(null,vals.concat([1]));var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  var bw=Math.floor(W/labels.length*0.6),gap=W/labels.length;
  vals.forEach(function(v,i){var h2=Math.round((v/max)*(H-18)),x=Math.round(i*gap+(gap-bw)/2),y=H-18-h2;ctx.fillStyle=acl;ctx.beginPath();ctx.rect(x,y,bw,h2);ctx.fill();ctx.fillStyle='#555';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(v,x+bw/2,H-4);});
}

// ── FOOD ───────────────────────────────────────────────────────────────
var NUTRITION_SCHEMES={
  loss:{name:'Похудение',desc:'Дефицит 500 ккал',calMod:-500,protMod:2.0},
  maintain:{name:'Поддержание',desc:'Без изменений',calMod:0,protMod:1.6},
  gain:{name:'Набор массы',desc:'Профицит 300 ккал',calMod:300,protMod:1.8},
  recomp:{name:'Рекомпозиция',desc:'Дефицит 200 + высокий белок',calMod:-200,protMod:2.2},
  custom:{name:'Пользовательский',desc:'Своя цель',calMod:null,protMod:1.8}
};

function calcTDEE(profile,user){
  var weight=parseFloat(profile.weight)||(user==='him'?114:75);
  var height=parseFloat(profile.height)||(user==='him'?175:168);
  var age=parseFloat(profile.age)||28;
  var bmr=user==='him'?(10*weight+6.25*height-5*age+5):(10*weight+6.25*height-5*age-161);
  return Math.round(bmr*1.375);
}

function getFoodGoals(user){
  var d=getD(),p=d.profile&&d.profile[user]?d.profile[user]:{};
  var scheme=p.scheme||'loss';var tdee=calcTDEE(p,user);
  var sc=NUTRITION_SCHEMES[scheme];
  var targetCal;
  if(scheme==='custom'&&p.customCal)targetCal=parseInt(p.customCal)||2000;
  else targetCal=tdee+(sc?sc.calMod||0:0);
  var weight=parseFloat(p.weight)||(user==='him'?114:75);
  var protMod=sc?sc.protMod||1.8:1.8;
  var targetProt=Math.round(weight*protMod);
  return{cal:Math.max(1200,targetCal),prot:targetProt,water:user==='him'?2500:2000};
}

function renderFoodCal(){
  var d=getD(),goals=getFoodGoals(CU);
  var now=new Date();
  var year=now.getFullYear(),month=now.getMonth();
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var months=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  var h='<div class="card cp">';
  h+='<div style="font-size:11px;font-weight:700;margin-bottom:12px">'+months[month]+' '+year+'</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">';
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(function(d2){h+='<div style="text-align:center;font-size:8px;color:var(--m)">'+d2+'</div>';});
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
  var startDay=(firstDay===0?6:firstDay-1);
  for(var i=0;i<startDay;i++)h+='<div></div>';
  for(var day=1;day<=daysInMonth;day++){
    var dateStr=year+'-'+(month+1<10?'0':'')+(month+1)+'-'+(day<10?'0':'')+day;
    var dayData=d.food&&d.food[CU]&&d.food[CU][dateStr];
    var cal=dayData?dayData.meals.reduce(function(s,m){return s+(m.cal||0);},0):0;
    var isToday=dateStr===today();
    var dotColor='transparent';var textColor='var(--m)';
    if(cal>0){
      var pct2=cal/goals.cal;
      if(pct2>=0.9)dotColor='var(--g)';
      else if(pct2>=0.7)dotColor='var(--y)';
      else dotColor='var(--r)';
      textColor='var(--t)';
    }
    h+='<div style="text-align:center;position:relative">';
    h+='<div style="width:28px;height:28px;border-radius:50%;border:'+(isToday?'1.5px solid var(--ac)':'1px solid transparent')+';background:'+(cal>0?dotColor+'22':'transparent')+';display:flex;align-items:center;justify-content:center;margin:0 auto">';
    h+='<span style="font-size:11px;color:'+textColor+'">'+day+'</span></div>';
    if(cal>0)h+='<div style="width:4px;height:4px;border-radius:50%;background:'+dotColor+';margin:1px auto 0"></div>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--m2)">';
  h+='<div><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--g);margin-right:4px"></span>90%+ цели</div>';
  h+='<div><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--y);margin-right:4px"></span>70-89%</div>';
  h+='<div><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--r);margin-right:4px"></span><70%</div>';
  h+='</div></div>';
  return h;
}

  var dayLabels=[['MO','Пн'],['TU','Вт'],['WE','Ср'],['TH','Чт'],['FR','Пт'],['SA','Сб'],['SU','Вс']];
  h+='<div class="sec">ДНИ ТРЕНИРОВОК</div><div class="card cp">';
  h+='<div style="font-size:11px;color:var(--m2);margin-bottom:10px">Отметь дни — на вкладке ПЛАН будет подсказка, тренировочный день сегодня или отдых.</div>';
  h+='<div style="display:flex;gap:5px">';
  dayLabels.forEach(function(dl2){
    var sel=td.indexOf(dl2[0])>=0;
    h+='<div onclick="toggleTrainDay(\''+dl2[0]+'\')" style="flex:1;text-align:center;padding:9px 2px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;border:1px solid '+(sel?'var(--ac)':'var(--b)')+';background:'+(sel?'rgba(124,58,237,.15)':'var(--s)')+';color:'+(sel?'var(--ac)':'var(--m2)')+'">'+dl2[1]+'</div>';
  });
  h+='</div></div>';
  // Tools
  h+='<div class="sec">ИНСТРУМЕНТЫ</div><div class="card cp">';
  h+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--m2);margin-bottom:8px;font-weight:700">🔢 Калькулятор блинов</div>';
  h+='<div style="font-size:11px;color:var(--m2);margin-bottom:8px">Какие блины повесить под нужный вес (гриф 20 кг)</div>';
  h+='<div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:6px">';
  h+='<div style="flex:1"><span class="lbl">Целевой вес кг</span><input class="inp" type="number" id="plateW" placeholder="60" inputmode="decimal" oninput="updatePlateCalc()"></div>';
  h+='</div><div id="plateResult" style="font-size:12px;color:var(--m2);min-height:18px"></div>';
  h+='<div style="height:1px;background:var(--b);margin:14px 0"></div>';
  h+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--m2);margin-bottom:8px;font-weight:700">💪 Оценка 1ПМ</div>';
  h+='<div style="font-size:11px;color:var(--m2);margin-bottom:8px">Разовый максимум по рабочему весу (формула Эпли)</div>';
  h+='<div class="row2" style="margin-bottom:6px"><div><span class="lbl">Вес кг</span><input class="inp" type="number" id="rmW" inputmode="decimal" oninput="update1RM()"></div><div><span class="lbl">Повторений</span><input class="inp" type="number" id="rmR" inputmode="numeric" oninput="update1RM()"></div></div>';
  h+='<div id="rmResult" style="font-size:12px;color:var(--m2);min-height:18px"></div>';
  h+='</div>';
  // Data section with import
  h+='<div class="sec">ДАННЫЕ</div>';
  h+='<div class="card cp"><div style="font-size:11px;color:var(--m2);margin-bottom:10px">💾 Делай экспорт раз в 1-2 недели. На iPhone данные могут стираться при долгом неиспользовании. Импорт восстановит всё из файла.</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:8px"><button onclick="exportData()" style="flex:1;padding:11px;border-radius:8px;border:1px solid var(--g);background:var(--gd);color:#6ee7b7;font-size:12px;cursor:pointer;font-weight:700">📤 Экспорт (бэкап)</button><button onclick="importData()" style="flex:1;padding:11px;border-radius:8px;border:1px solid var(--ac);background:rgba(124,58,237,.12);color:var(--acl);font-size:12px;cursor:pointer;font-weight:700">📥 Импорт</button></div>';
  var dsb=daysSinceBackup();
  if(dsb<900)h+='<div style="font-size:10px;color:var(--m2);text-align:center;margin-bottom:8px">Последний бэкап: '+(dsb===0?'сегодня':dsb+' дн назад')+'</div>';
  h+='<button onclick="if(confirm(\'Удалить ВСЕ данные? Сделай экспорт перед этим!\'))resetData()" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--r);background:transparent;color:var(--r);font-size:12px;cursor:pointer">🗑 Сбросить всё</button></div>';
  // Level
  var lvl=getLevel();
  h+='<div class="card cp"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--m2);margin-bottom:8px;font-weight:700">Уровень подготовки</div>';
  h+='<div style="display:flex;gap:8px">';
  [['beginner','Новичок'],['experienced','Есть база']].forEach(function(L){
    var sel=lvl===L[0];
    h+='<div onclick="setLevel(\''+L[0]+'\')" style="flex:1;text-align:center;padding:10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;border:1px solid '+(sel?'var(--ac)':'var(--b)')+';background:'+(sel?'rgba(124,58,237,.15)':'var(--s)')+';color:'+(sel?'var(--ac)':'var(--m2)')+'">'+L[1]+'</div>';
  });
  h+='</div></div>';
  document.getElementById('pg-prof').innerHTML=h;
}
function updatePlateCalc(){
  var el=document.getElementById('plateW'),res=document.getElementById('plateResult');if(!el||!res)return;
  var w=parseFloat(el.value);if(!w||w<20){res.textContent=w&&w<20?'Меньше веса грифа (20 кг)':'';return;}
  var pl=calcPlates(w,20);if(!pl||!pl.perSide.length){res.textContent='Только гриф (20 кг)';return;}
  var txt=pl.perSide.map(function(x){return x.n+'×'+x.w+'кг';}).join(' + ');
  res.innerHTML='С каждой стороны: <b style="color:var(--t)">'+txt+'</b>'+(pl.rem>0?' <span style="color:var(--y)">(+'+pl.rem+'кг не набирается)</span>':'');
}
function update1RM(){
  var w=parseFloat((document.getElementById('rmW')||{}).value),r=parseInt((document.getElementById('rmR')||{}).value);
  var res=document.getElementById('rmResult');if(!res)return;
  if(!w||!r){res.textContent='';return;}
  var rm=calc1RM(w,r);
  res.innerHTML='Твой 1ПМ ≈ <b style="color:var(--t)">'+rm+'кг</b>. Для силы работай в 80-90% ('+Math.round(rm*0.8)+'-'+Math.round(rm*0.9)+'кг), для массы 65-75% ('+Math.round(rm*0.65)+'-'+Math.round(rm*0.75)+'кг).';
}
function saveProfile(){
  var d=getD();if(!d.profile)d.profile={};var prev=d.profile[CU]||{};
  var fields=['height','weight','target','age','chest','waist','hips','bicep'];var obj={};
  fields.forEach(function(f){var el=document.getElementById('pf_'+f);obj[f]=el?(el.value||prev[f]):prev[f];});
  obj.startWeight=prev.startWeight||obj.weight;obj.scheme=prev.scheme||'loss';obj.customCal=prev.customCal;
  d.profile[CU]=obj;setD(d);showToast('Сохранено ✅');renderProf();
}
function exportData(){var d=getD();d.lastBackup=today();setD(d);var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='gym_backup_'+today()+'.json';a.click();URL.revokeObjectURL(url);showToast('Бэкап сохранён 📤');}
function resetData(){localStorage.removeItem('gym_v6');showToast('Данные удалены');setTimeout(function(){location.reload();},800);}
function importData(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.logs&&!data.profile){showToast('Неверный формат файла','var(--r)');return;}
        if(confirm('Заменить ВСЕ текущие данные данными из файла? Текущий прогресс будет перезаписан.')){
          setD(data);showToast('Данные восстановлены ✅');setTimeout(function(){location.reload();},900);
        }
      }catch(err){showToast('Ошибка чтения файла','var(--r)');}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function daysSinceBackup(){var d=getD();if(!d.lastBackup)return 999;return Math.floor((Date.now()-new Date(d.lastBackup).getTime())/86400000);}
function hasData(){var d=getD();return Object.keys(d.logs||{}).length>0;}

// Plate calculator (Epley)
function calcPlates(target,bar){
  bar=bar||20;var plates=[25,20,15,10,5,2.5,1.25];var perSide=(target-bar)/2;
  if(perSide<0)return null;var res=[];
  plates.forEach(function(p){var c=Math.floor(perSide/p+0.001);if(c>0){res.push({w:p,n:c});perSide-=c*p;}});
  return{perSide:res,rem:Math.round(perSide*100)/100};
}
function calc1RM(w,reps){if(!w||!reps)return 0;return Math.round(w*(1+reps/30));}

// Mood / notes
function saveMood(mood){
  var d=getD();if(!d.notes)d.notes={};if(!d.notes[CU])d.notes[CU]={};
  var t=today();if(!d.notes[CU][t])d.notes[CU][t]={};
  d.notes[CU][t].mood=mood;setD(d);renderPlan();
}
function saveNote(){
  var el=document.getElementById('todayNote');if(!el)return;
  var d=getD();if(!d.notes)d.notes={};if(!d.notes[CU])d.notes[CU]={};
  var t=today();if(!d.notes[CU][t])d.notes[CU][t]={};
  d.notes[CU][t].text=el.value;setD(d);showToast('Заметка сохранена');
}
function getTodayNote(){var d=getD();var t=today();return(d.notes&&d.notes[CU]&&d.notes[CU][t])||{};}

// Training days
function toggleTrainDay(day){
  var d=getD();if(!d.profile)d.profile={};if(!d.profile[CU])d.profile[CU]={};
  var td=d.profile[CU].trainDays||[];
  var idx=td.indexOf(day);
  if(idx>=0)td.splice(idx,1);else td.push(day);
  d.profile[CU].trainDays=td;setD(d);renderProf();
}
function getTrainDays(){var d=getD();return(d.profile&&d.profile[CU]&&d.profile[CU].trainDays)||[];}
function isTrainingDay(){
  var td=getTrainDays();if(!td.length)return null;
  var dayMap=['SU','MO','TU','WE','TH','FR','SA'];
  var todayCode=dayMap[new Date().getDay()];
  return td.indexOf(todayCode)>=0;
}

// Onboarding
function showOnboarding(){
  var ov=document.getElementById('onboardOv');if(ov)ov.classList.add('show');
}
function setLevel(lvl){
  var d=getD();d.level=lvl;d.onboarded=true;setD(d);
  var ov=document.getElementById('onboardOv');if(ov)ov.classList.remove('show');
  showToast(lvl==='beginner'?'Программа для новичка готова! 💪':'Программа с базой готова! 💪');
  renderPlan();
}
function checkOnboarding(){var d=getD();if(!d.onboarded){showOnboarding();}}

// ── NAVIGATION ─────────────────────────────────────────────────────────
function switchUser(u){
  CU=u;openDays={};openExs={};
  document.querySelectorAll('.utab').forEach(function(t){t.classList.remove('a');});
  document.querySelector('.utab.'+u).classList.add('a');
  var isHer=u==='her';
  document.documentElement.style.setProperty('--ac',isHer?'var(--her)':'var(--him)');
  document.documentElement.style.setProperty('--acl',isHer?'var(--herl)':'var(--himl)');
  document.documentElement.style.setProperty('--acd',isHer?'var(--herd)':'var(--himd)');
  renderAll();
}
function gp(page,el){
  CP=page;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('a');});
  document.querySelectorAll('.bni').forEach(function(b){b.classList.remove('a');});
  document.getElementById('pg-'+page).classList.add('a');
  el.classList.add('a');
  if(page==='plan')renderPlan();else if(page==='prog')renderProg();else if(page==='food')renderFood();else if(page==='help')renderHelp();else if(page==='prof')renderProf();
  window.scrollTo(0,0);
}
function renderAll(){
  renderPlan();
  if(CP==='prog')renderProg();else if(CP==='food')renderFood();else if(CP==='help')renderHelp();else if(CP==='prof')renderProf();
}

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
switchUser('him');
checkOnboarding();
</script>
</body>
</html>
