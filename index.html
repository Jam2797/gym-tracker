<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GYM">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>GYM TRACKER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Montserrat:wght@400;600;700&display=swap');
:root{--bg:#080808;--s:#111;--c:#161616;--b:#252525;--him:#7c3aed;--himl:#a78bfa;--himd:#1e1030;--her:#db2777;--herl:#f472b6;--herd:#2d0a1a;--g:#10b981;--gd:#052e1c;--y:#f59e0b;--r:#ef4444;--t:#f0f0f0;--m:#555;--m2:#888;--ac:var(--him);--acl:var(--himl);--acd:var(--himd)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t);font-family:'Montserrat',sans-serif;min-height:100vh;overflow-x:hidden}
.nav{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:54px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(135deg,var(--himl),var(--herl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.utabs{display:flex;gap:4px;background:var(--s);border-radius:10px;padding:4px}
.utab{padding:5px 14px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;color:var(--m2);text-transform:uppercase;transition:all .2s}
.utab.him.a{background:var(--him);color:#fff}.utab.her.a{background:var(--her);color:#fff}
.page{display:none;padding:12px 14px 100px}.page.a{display:block}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.97);backdrop-filter:blur(20px);border-top:1px solid var(--b);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 2px;cursor:pointer;color:var(--m);font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;gap:3px;transition:color .2s}
.bni.a{color:var(--ac)}.bni svg{width:19px;height:19px}
.sec{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--m2);margin:18px 0 10px}.sec:first-child{margin-top:4px}
.card{background:var(--c);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:10px}.cp{padding:14px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.bg-him{background:var(--himd);color:var(--himl)}.bg-her{background:var(--herd);color:var(--herl)}
.bg-g{background:var(--gd);color:#6ee7b7}.bg-y{background:#2a1800;color:#fbbf24}.bg-r{background:#2a0000;color:#f87171}.bg-x{background:#222;color:var(--m2)}
.btn{width:100%;padding:11px;border-radius:9px;border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}.btn:active{opacity:.7}
.btn-him{background:var(--him);color:#fff}.btn-her{background:var(--her);color:#fff}.btn-grad{background:linear-gradient(135deg,var(--him),var(--her));color:#fff}
.inp{background:var(--s);border:1px solid var(--b);border-radius:7px;color:var(--t);padding:8px 10px;font-size:14px;font-family:'DM Mono',monospace;outline:none;-webkit-appearance:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:var(--ac)}.lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--m);margin-bottom:3px;display:block}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.day-hdr{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer}
.day-hdr.him-g{background:linear-gradient(90deg,var(--himd),transparent)}.day-hdr.her-g{background:linear-gradient(90deg,var(--herd),transparent)}
.day-num{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;opacity:.28}
.day-num.him{color:var(--himl)}.day-num.her{color:var(--herl)}
.day-meta h3{font-size:14px;font-weight:700}.day-meta p{font-size:11px;color:var(--m2);margin-top:2px}
.tog{margin-left:auto;width:26px;height:26px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;transition:transform .3s;flex-shrink:0}.tog svg{width:13px;height:13px}
.open .tog{transform:rotate(180deg)}.day-body{display:none;padding:0 13px 13px}.open .day-body{display:block}
.ex-block{margin-top:10px;border:1px solid var(--b);border-radius:10px;overflow:hidden}
.ex-title{padding:8px 12px;font-size:11px;font-weight:700;background:#1e1e1e;display:flex;gap:6px;align-items:center}
.ex-title.him{border-left:3px solid var(--him)}.ex-title.her{border-left:3px solid var(--her)}
.ex-row{border-bottom:1px solid #181818;transition:background .15s}.ex-row:last-child{border-bottom:none}.ex-row:active{background:#1a1a1a}
.ex-main{display:flex;align-items:center;padding:11px 12px;cursor:pointer;gap:9px}
.ex-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.ex-ico.him{background:var(--himd)}.ex-ico.her{background:var(--herd)}
.ex-info{flex:1;min-width:0}.ex-name{font-size:13px;font-weight:600}.ex-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.ex-arr{width:17px;height:17px;flex-shrink:0;color:var(--m);transition:transform .3s,color .2s}
.ex-open .ex-arr{transform:rotate(180deg);color:var(--ac)}
.ex-detail{display:none;background:#0d0d0d;border-top:1px solid var(--b)}.ex-open .ex-detail{display:block}
.ex-svg{padding:14px;text-align:center;background:#0a0a0a;border-bottom:1px solid var(--b)}
.ex-tips{padding:10px 12px;border-bottom:1px solid var(--b)}
.ex-tip{display:flex;gap:7px;padding:4px 0;font-size:12px;color:var(--m2);line-height:1.5}
.ex-tip::before{content:"→";color:var(--ac);font-weight:700;flex-shrink:0}
.ex-log{padding:11px 12px}
.ex-restrict{padding:10px 12px;background:#1f1200;font-size:11px;color:#fbbf24;border-bottom:1px solid var(--b)}
.sug{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.sug.g{background:var(--gd);color:#6ee7b7}.sug.y{background:#2a1800;color:#fbbf24}.sug.r{background:#2a0000;color:#f87171}.sug.n{background:#222;color:var(--m2)}
.deload-banner{padding:11px 13px;background:#1a0f00;border-radius:10px;font-size:12px;color:#fbbf24;border-left:3px solid var(--y);margin-bottom:12px}
.stats4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:12px}
.stat .v{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.stat .l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:4px}.stat .sub{font-size:10px;color:var(--m2);margin-top:2px}
.v.him{color:var(--himl)}.v.her{color:var(--herl)}.v.g{color:var(--g)}
.pb-item{margin-bottom:12px}.pb-hdr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.pb-name{font-weight:600}.pb-val{color:var(--m2);font-family:'DM Mono',monospace}
.pb{height:5px;background:var(--s);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;border-radius:99px;transition:width .8s}
.pb-fill.him{background:linear-gradient(90deg,var(--him),var(--himl))}.pb-fill.her{background:linear-gradient(90deg,var(--her),var(--herl))}
.ana-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--b);font-size:12px;color:var(--m2);line-height:1.5}
.ana-item:last-child{border-bottom:none}.dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dot.g{background:var(--g)}.dot.y{background:var(--y)}.dot.r{background:var(--r)}
.mac3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.mac{background:var(--s);border-radius:8px;padding:9px;text-align:center}
.mac .mv{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}.mac .ml{font-size:9px;color:var(--m2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.meal-item{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:var(--s);border-radius:7px;font-size:11px;gap:8px;margin-bottom:5px}
.mi-n{flex:1;font-weight:600}.mi-del{color:var(--m);cursor:pointer;padding:2px 5px;font-size:15px}
.water-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wbtn{padding:6px 12px;background:var(--s);border:1px solid var(--b);border-radius:7px;color:var(--t);font-size:12px;cursor:pointer;font-family:'DM Mono',monospace}.wbtn:active{background:var(--b)}
.field-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.field-row label{font-size:12px;color:var(--m2);width:100px;flex-shrink:0}.field-row .inp{flex:1}
.act-btn{width:100%;padding:11px 13px;background:var(--c);border:1px solid var(--b);border-radius:10px;display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;text-align:left}.act-btn:active{background:var(--s)}
.act-ico{font-size:22px;flex-shrink:0}.act-name{font-size:13px;font-weight:700}.act-sub{font-size:11px;color:var(--m2);margin-top:1px}
.act-log-form{background:var(--c);border:1px solid var(--b);border-radius:11px;padding:14px;margin-bottom:10px;display:none}
.rest-ov{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s);border:1px solid var(--b);border-radius:14px;padding:12px 20px;z-index:999;display:none;align-items:center;gap:14px;box-shadow:0 4px 30px rgba(0,0,0,.7)}
.rest-ov.show{display:flex}.rt-n{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;transition:color .5s}
.rt-lbl{font-size:9px;color:var(--m2);text-transform:uppercase;letter-spacing:1px}
.rt-skip{padding:7px 13px;background:var(--b);border:none;border-radius:7px;color:var(--m2);font-size:11px;cursor:pointer}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--g);color:#fff;padding:8px 18px;border-radius:99px;font-size:12px;font-weight:700;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
canvas{width:100%!important;display:block}
.sel{width:100%;background:var(--s);border:1px solid var(--b);border-radius:7px;color:var(--t);padding:7px 10px;font-size:11px;outline:none;-webkit-appearance:none;font-family:'Montserrat',sans-serif;margin-bottom:11px}
.phase-info{padding:10px 13px;background:var(--gd);border-radius:9px;font-size:12px;color:#6ee7b7;margin-bottom:12px;border-left:2px solid var(--g)}
.injury-note{padding:10px 13px;background:#1f1200;border-radius:9px;font-size:12px;color:#fbbf24;border-left:3px solid var(--y);margin-bottom:12px}
.sec-tabs{display:flex;gap:5px;margin-bottom:12px;background:var(--s);border-radius:9px;padding:3px}
.sec-tab{flex:1;padding:7px;border-radius:7px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:center;cursor:pointer;color:var(--m2);transition:all .2s}.sec-tab.a{background:var(--ac);color:#fff}
.pane{display:none}.pane.a{display:block}
.cycle-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:linear-gradient(135deg,var(--him),var(--her));color:#fff;margin-left:8px}
</style>
</head>
<body>
<div class="nav">
  <div class="logo">GYM TRACKER</div>
  <div class="utabs">

  </div>
  <div class="bni" onclick="gp('food',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>ПИТАНИЕ

function getD(){try{var r=localStorage.getItem('gym_v5');return r?JSON.parse(r):{logs:{},profile:{him:{},her:{}},food:{},acts:[]};}catch(e){return{logs:{},profile:{him:{},her:{}},food:{},acts:[]};}}
function setD(d){try{localStorage.setItem('gym_v5',JSON.stringify(d));}catch(e){}}
function today(){return new Date().toISOString().slice(0,10);}
function getLogs(user,exId){var d=getD(),k=user+'_'+exId;return (d.logs[k]||[]).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});}
function addLog(user,exId,weight,reps,sets){var d=getD(),k=user+'_'+exId;if(!d.logs[k])d.logs[k]=[];d.logs[k].push({date:today(),weight:parseFloat(weight)||0,reps:parseInt(reps)||0,sets:parseInt(sets)||3});setD(d);}
function delLog(user,exId,idx){var d=getD(),k=user+'_'+exId;if(d.logs[k]){d.logs[k].splice(idx,1);setD(d);}}

function totalSessions(user){
  var d=getD(),dates={},prefix=user+'_';
  Object.keys(d.logs||{}).forEach(function(k){if(k.indexOf(prefix)!==0)return;(d.logs[k]||[]).forEach(function(l){dates[l.date]=1;});});
  return Object.keys(dates).length;
}
function getPhaseIdx(user){
  var n=totalSessions(user),phases=PHASES[user];
  for(var i=0;i<phases.length;i++){if(n>=phases[i].sessions[0]&&n<=phases[i].sessions[1])return i;}
  return phases.length-1;
}
function getPhase(user){return PHASES[user][getPhaseIdx(user)];}
function getCycleNum(user){return Math.floor(getPhaseIdx(user)/3)+1;}

// Days since last workout
function daysSinceLast(user){
  var d=getD(),prefix=user+'_',last='';
  Object.keys(d.logs||{}).forEach(function(k){if(k.indexOf(prefix)!==0)return;(d.logs[k]||[]).forEach(function(l){if(l.date>last)last=l.date;});});
  if(!last)return 0;
  return Math.floor((Date.now()-new Date(last).getTime())/86400000);
}
// Deload factor based on rest days
function deloadFactor(user){
  var days=daysSinceLast(user);
  if(days<=3)return{f:1.0,msg:null};
  if(days<=6)return{f:0.9,msg:'Перерыв '+days+' дней → -10% к весу для разминки. Вернёшься быстро.'};
  if(days<=13)return{f:0.8,msg:'Перерыв '+days+' дней → -20% к весу. Деload-неделя: восстанови технику.'};
  return{f:0.7,msg:'Перерыв '+days+' дней → -30% к весу! Форма требует осторожного восстановления.'};
}

function getDayKeys(user){return user==='him'?['A','B','C']:['1','2','3'];}
function getLastDayKey(user){
  var d=getD(),prefix=user+'_',phase=getPhase(user),dayKeys=getDayKeys(user);
  var latestByDay={};
  dayKeys.forEach(function(dk){
    var dayExs=((phase[dk])||{}).ids||[];
    var latestForDay='';
    dayExs.forEach(function(exId){var k=prefix+exId;(d.logs[k]||[]).forEach(function(l){if(l.date>latestForDay)latestForDay=l.date;});});
    if(latestForDay)latestByDay[dk]=latestForDay;
  });
  var lastDate='',lastKey='';
  Object.keys(latestByDay).forEach(function(dk){if(latestByDay[dk]>lastDate){lastDate=latestByDay[dk];lastKey=dk;}});
  return lastKey;
}
function getNextDayKey(user){
  var last=getLastDayKey(user),keys=getDayKeys(user);
  if(!last)return keys[0];
  var idx=keys.indexOf(last);
  return keys[(idx+1)%keys.length];
}

function getSuggestion(user,exId){
  var ex=EX[exId];if(!ex)return{w:0,label:'',cls:'n'};
  var logs=getLogs(user,exId);
  var dl=deloadFactor(user);
  if(!logs.length){return{w:ex.dw,label:'Старт',cls:'n'};}
  var last=logs[0];
  var baseW;
  if(last.sets>=ex.ts&&last.reps>=ex.tr){
    var two=(logs.length>=2&&logs[1].sets>=ex.ts&&logs[1].reps>=ex.tr);
    baseW=two?(last.weight+ex.inc):last.weight;
    var lbl=two?('+'+ex.inc+'кг!'):('Ещё раз, потом +'+ex.inc);
    var cls=two?'g':'y';
    var finalW=Math.round(baseW*dl.f*2)/2;
    if(dl.f<1)lbl='Деload '+finalW+'кг';
    return{w:finalW,label:lbl,cls:dl.f<1?'r':cls};
  } else if(last.reps<ex.tr-3&&last.weight>ex.dw){
    baseW=Math.max(ex.dw,last.weight-ex.inc);
    return{w:Math.round(baseW*dl.f*2)/2,label:'Снизь',cls:'r'};
  } else {
    baseW=last.weight;
    var finalW2=Math.round(baseW*dl.f*2)/2;
    return{w:finalW2,label:dl.f<1?'Деload':'Держи',cls:dl.f<1?'r':'y'};
  }
}

function buildAnalysis(allLogs,totalDays){
  if(!allLogs.length)return'<div style="text-align:center;padding:30px;color:var(--m)">🧠 Нет данных. Запиши первую тренировку!</div>';
  var items=[],now=new Date();
  var allDates=[];allLogs.forEach(function(l){if(allDates.indexOf(l.date)<0)allDates.push(l.date);});allDates.sort();
  var d30=allDates.filter(function(dt){return new Date(dt)>new Date(now-30*864e5);}).length;
  if(d30>=10)items.push({c:'g',t:'Отличная частота: '+d30+' тренировок за 30 дней!'});
  else if(d30>=6)items.push({c:'y',t:d30+' тренировок за 30 дней. Цель — 12+.'});
  else items.push({c:'r',t:'Только '+d30+' тренировок за 30 дней. Нужна регулярность — 3 раза/нед.'});
  var dg=allDates.length?Math.floor((now-new Date(allDates[allDates.length-1]))/864e5):99;
  var dl=deloadFactor(CU);
  if(dg<=1)items.push({c:'g',t:'Последняя тренировка '+(dg===0?'сегодня':'вчера')+' 🔥'});
  else if(dg<=3)items.push({c:'g',t:'Последняя тренировка '+dg+' дня назад. Хороший ритм!'});
  else if(dg<=6)items.push({c:'y',t:'Последняя тренировка '+dg+' дней назад. '+dl.msg});
  else items.push({c:'r',t:'Перерыв '+dg+' дней! '+dl.msg});
  var byEx={};allLogs.forEach(function(l){if(!byEx[l.exId])byEx[l.exId]=[];byEx[l.exId].push(l);});
  var prog=0,stuck=0;
  Object.keys(byEx).forEach(function(k){
    var logs=byEx[k];if(logs.length<3)return;
    var sorted=logs.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var h2=Math.ceil(sorted.length/2);
    var af=sorted.slice(0,h2).reduce(function(s,l){return s+(l.weight||0);},0)/h2;
    var al=sorted.slice(h2).reduce(function(s,l){return s+(l.weight||0);},0)/(sorted.length-h2||1);
    if(al>af*1.04)prog++;else if(al<=af)stuck++;
  });
  if(prog>0)items.push({c:'g',t:'Прогрессия веса в '+prog+' упражнении!'});
  if(stuck>0)items.push({c:'y',t:'В '+stuck+' упражнении вес не растёт. Попробуй +2.5кг на следующей тренировке.'});
  var phIdx=getPhaseIdx(CU),phase=getPhase(CU),cycle=getCycleNum(CU);
  items.push({c:'g',t:'Текущая фаза: '+phase.label+' — '+phase.name+(cycle>1?' (Цикл '+cycle+')':'')+'.'});
  var nextPhase=PHASES[CU][Math.min(phIdx+1,PHASES[CU].length-1)];
  if(nextPhase&&nextPhase!==phase){var rem=phase.sessions[1]-totalSessions(CU);if(rem>0)items.push({c:'y',t:'До следующей фазы ('+nextPhase.name+'): ~'+rem+' тренировок.'});}
  var recs=[],bgEx=Object.keys(byEx).slice(0,4);
  if(dg>=4)recs.push({c:'r',t:'Запланируй тренировку! 4+ дней без нагрузки замедляет прогресс.'});
  bgEx.forEach(function(k){var logs=byEx[k];var last=logs[logs.length-1];var ex=EX[k];if(last&&ex&&last.reps>=ex.tr&&last.sets>=ex.ts)recs.push({c:'g',t:ex.n+': выполнил всё — следующий раз +'+ex.inc+'кг!'});});
  if(CU==='him'&&totalDays>20&&!byEx['dead'])recs.push({c:'y',t:'Рекомендуем добавить становую тягу — фундаментальное упражнение для силы.'});
  if(!recs.length)recs.push({c:'g',t:'Продолжай в том же темпе. Ты двигаешься правильно!'});
  var h='<div class="card cp"><div style="font-size:13px;font-weight:700;margin-bottom:10px">🧠 Автоматический анализ</div>';
  items.forEach(function(i){h+='<div class="ana-item"><div class="dot '+i.c+'"></div><div>'+i.t+'</div></div>';});
  h+='</div><div class="card cp" style="margin-top:10px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">📌 Рекомендации на эту неделю</div>';
  recs.forEach(function(r){h+='<div class="ana-item"><div class="dot '+r.c+'"></div><div>'+r.t+'</div></div>';});
  h+='</div>';

  // Что будет после всех фаз
  h+='<div class="card cp" style="margin-top:10px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">🔄 Как работает адаптация</div>';
  h+='<div class="ana-item"><div class="dot g"></div><div><b style="color:var(--t)">Пропустил 1–3 дня:</b> норма, вес без изменений.</div></div>';
  h+='<div class="ana-item"><div class="dot y"></div><div><b style="color:var(--t)">Пропустил 4–6 дней:</b> трекер автоматически снижает предложенный вес на 10% для безопасной разминки.</div></div>';
  h+='<div class="ana-item"><div class="dot y"></div><div><b style="color:var(--t)">Пропустил 7–13 дней:</b> -20%. Деload-неделя — восстановление техники.</div></div>';
  h+='<div class="ana-item"><div class="dot r"></div><div><b style="color:var(--t)">Пропустил 2+ недели:</b> -30%. Осторожное восстановление, не торопись.</div></div>';
  h+='<div class="ana-item"><div class="dot g"></div><div><b style="color:var(--t)">После 3 фаз (Цикл 2+):</b> программа перезапускается с более тяжёлыми упражнениями. Веса рассчитываются от твоих лучших результатов — прогресс накапливается бесконечно.</div></div>';
  h+='</div>';
  return h;
}

function drawLine(exId,acl,acf){
  var canvas=document.getElementById('progC');if(!canvas)return;
  var d=getD(),prefix=CU+'_',k=prefix+exId;
  var logs=(d.logs[k]||[]).slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var weights=logs.map(function(l){return l.weight;}),labels=logs.map(function(l){return l.date;});
  if(!weights.length){canvas.style.display='none';return;}
  canvas.style.display='block';
  var W=canvas.offsetWidth||300,H=150;canvas.width=W;canvas.height=H;
  var p={t:15,r:15,b:28,l:36},cw=W-p.l-p.r,ch=H-p.t-p.b;
  var max=Math.max.apply(null,weights)*1.1||10,min=Math.min.apply(null,weights)*0.9||0,range=max-min||1;
  var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var y=p.t+(ch/4)*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();ctx.fillStyle='#555';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText(Math.round(max-(range/4)*i),p.l-3,y+3);}
  if(weights.length<2){var x0=p.l+cw/2,y0=p.t+ch-((weights[0]-min)/range)*ch;ctx.beginPath();ctx.arc(x0,y0,5,0,Math.PI*2);ctx.fillStyle=acl;ctx.fill();return;}
  ctx.beginPath();weights.forEach(function(v,i){var x=p.l+(i/(weights.length-1))*cw,y=p.t+ch-((v-min)/range)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.lineTo(p.l+cw,p.t+ch);ctx.lineTo(p.l,p.t+ch);ctx.closePath();ctx.fillStyle=acf;ctx.fill();
  ctx.beginPath();ctx.strokeStyle=acl;ctx.lineWidth=2.5;ctx.lineJoin='round';weights.forEach(function(v,i){var x=p.l+(i/(weights.length-1))*cw,y=p.t+ch-((v-min)/range)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  weights.forEach(function(v,i){var x=p.l+(i/(weights.length-1))*cw,y=p.t+ch-((v-min)/range)*ch;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=acl;ctx.fill();ctx.strokeStyle='#0d0d0d';ctx.lineWidth=1.5;ctx.stroke();});
  ctx.fillStyle='#555';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText(labels[0],p.l,H-4);ctx.textAlign='right';ctx.fillText(labels[labels.length-1],p.l+cw,H-4);
}
function drawWeek(allLogs,acl,acf){
  var canvas=document.getElementById('weekC');if(!canvas)return;
  var weeks={};allLogs.forEach(function(l){var dt=new Date(l.date);var wk=dt.getFullYear()+'-W'+Math.ceil((dt.getDate()+new Date(dt.getFullYear(),dt.getMonth(),1).getDay())/7);weeks[wk]=(weeks[wk]||0)+1;});
  var labels=Object.keys(weeks).sort().slice(-10),vals=labels.map(function(w){return weeks[w];});
  if(!labels.length)return;
  var W=canvas.offsetWidth||300,H=90;canvas.width=W;canvas.height=H;
  var max=Math.max.apply(null,vals.concat([1]));var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  var bw=Math.floor(W/labels.length*0.6),gap=W/labels.length;
  vals.forEach(function(v,i){var h2=Math.round((v/max)*(H-18)),x=Math.round(i*gap+(gap-bw)/2),y=H-18-h2;ctx.fillStyle=acl;ctx.beginPath();ctx.rect(x,y,bw,h2);ctx.fill();ctx.fillStyle='#555';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(v,x+bw/2,H-4);});
}

  h+='</div>';
  h+='<div class="sec">ВОДА</div><div class="card cp"><div class="water-row">';
  [200,350,500].forEach(function(ml){h+='<button class="wbtn" onclick="addWater('+ml+')">+'+ml+'мл</button>';});
  h+='<div style="margin-left:auto;font-family:\'Bebas Neue\',sans-serif;font-size:24px;color:#60a5fa">'+(water/1000).toFixed(1)+'л</div></div>';
  h+='<div style="font-size:11px;color:var(--m2);margin-top:7px">Цель: '+(goals.water/1000).toFixed(1)+'л · '+(water>=goals.water?'✅ Выполнено!':Math.round((goals.water-water)/1000*10)/10+'л осталось')+'</div></div>';
  h+='<div class="sec">ДОБАВИТЬ ЕДУ</div><div class="card cp">';
  h+='<div class="row3" style="margin-bottom:7px"><input class="inp" type="text" id="mName" placeholder="Что ел?"><input class="inp" type="number" id="mCal" placeholder="ккал" inputmode="numeric"><input class="inp" type="number" id="mProt" placeholder="белок г" inputmode="numeric"></div>';
  h+='<button class="btn btn-'+ac+'" onclick="addMeal()">+ ДОБАВИТЬ</button>';
  h+='<div style="margin-top:9px;display:flex;flex-direction:column;gap:5px">';
  df.meals.forEach(function(m,i){h+='<div class="meal-item"><span class="mi-n">'+m.name+'</span><span style="color:var(--y);font-family:monospace;font-size:11px">'+m.cal+'ккал</span><span style="color:var(--g);font-family:monospace;font-size:11px">'+m.prot+'г</span><span class="mi-del" onclick="delMeal('+i+')">×</span></div>';});
  if(!df.meals.length)h+='<div style="color:var(--m);font-size:12px;text-align:center;padding:8px">Нет записей</div>';
  h+='</div></div>';
  var tips=CU==='him'?['Белок: 2г/кг → ~228г/день','Калории: 2400 ккал (-500 от нормы)','Углеводы до и после тренировки','Жиры минимум 60г/день']:['Белок: 1.6г/кг → ~130г/день','Калории: 1800 ккал (-400 от нормы)','Клетчатка и овощи в каждый приём','Перекусы: творог, яйца, орехи, кефир'];
  h+='<div class="card cp" style="margin-top:10px"><div style="font-size:11px;font-weight:700;margin-bottom:8px">💡 Рекомендации</div>';
  tips.forEach(function(t){h+='<div style="font-size:12px;color:var(--m2);line-height:1.8">• '+t+'</div>';});
  h+='</div>';
  document.getElementById('pg-food').innerHTML=h;
}
function addMeal(){var n=(document.getElementById('mName').value||'').trim();var c=parseFloat(document.getElementById('mCal').value)||0;var p=parseFloat(document.getElementById('mProt').value)||0;if(!n){showToast('Введи название');return;}var d=getD(),t=today();if(!d.food)d.food={};if(!d.food[CU])d.food[CU]={};if(!d.food[CU][t])d.food[CU][t]={meals:[],water:0};d.food[CU][t].meals.push({name:n,cal:c,prot:p});setD(d);showToast('Записано 🍽');renderFood();}
function delMeal(i){var d=getD(),t=today();if(d.food&&d.food[CU]&&d.food[CU][t]){d.food[CU][t].meals.splice(i,1);setD(d);renderFood();}}
function addWater(ml){var d=getD(),t=today();if(!d.food)d.food={};if(!d.food[CU])d.food[CU]={};if(!d.food[CU][t])d.food[CU][t]={meals:[],water:0};d.food[CU][t].water=(d.food[CU][t].water||0)+ml;setD(d);showToast('+'+ml+'мл 💧');renderFood();}

function renderProf(){
  var ac=CU==='him'?'him':'her';
  var d=getD(),p=(d.profile&&d.profile[CU])?d.profile[CU]:{};
  var h='<div class="sec">ПРОФИЛЬ</div><div class="card cp"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--m2);margin-bottom:10px;font-weight:700">Данные</div>';
  var fields=[['Рост (см)','height','numeric'],['Вес сейчас (кг)','weight','decimal'],['Цель (кг)','target','decimal'],['Возраст','age','numeric'],['Грудь (см)','chest','decimal'],['Талия (см)','waist','decimal'],['Бёдра (см)','hips','decimal']];
  if(CU==='him')fields.push(['Бицепс (см)','bicep','decimal']);
  fields.forEach(function(f){h+='<div class="field-row"><label>'+f[0]+'</label><input class="inp" type="number" id="pf_'+f[1]+'" value="'+(p[f[1]]||'')+'" inputmode="'+f[2]+'"></div>';});
  h+='</div><button class="btn btn-grad" onclick="saveProfile()" style="margin-bottom:10px">СОХРАНИТЬ ПРОФИЛЬ</button>';
  if(p.weight&&p.target){var cur=parseFloat(p.weight),tgt=parseFloat(p.target),start=parseFloat(p.startWeight||p.weight);var lost=start-cur,toGo=cur-tgt,total=start-tgt;var pct2=total>0?Math.min(100,Math.max(0,Math.round(lost/total*100))):0;h+='<div class="card cp"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--m2);margin-bottom:10px;font-weight:700">Прогресс по весу</div><div class="pb-item"><div class="pb-hdr"><span class="pb-name">Снижение</span><span class="pb-val">-'+lost.toFixed(1)+'кг / ещё '+toGo.toFixed(1)+'кг</span></div><div class="pb"><div class="pb-fill '+ac+'" style="width:'+pct2+'%"></div></div></div><div style="text-align:center;font-family:\'Bebas Neue\',sans-serif;font-size:38px;color:var(--g);margin:8px 0">'+pct2+'%</div><div style="text-align:center;font-size:11px;color:var(--m2)">к цели '+tgt+'кг</div></div>';}
  h+='<div class="sec">ДАННЫЕ</div><div class="card cp"><div style="display:flex;gap:8px"><button onclick="exportData()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:12px;cursor:pointer">📤 Экспорт</button><button onclick="if(confirm(\'Удалить все данные?\'))resetData()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--r);background:transparent;color:var(--r);font-size:12px;cursor:pointer">🗑 Сбросить</button></div></div>';
  document.getElementById('pg-prof').innerHTML=h;
}
function saveProfile(){var d=getD();if(!d.profile)d.profile={};var prev=d.profile[CU]||{};var fields=['height','weight','target','age','chest','waist','hips','bicep'];var obj={};fields.forEach(function(f){var el=document.getElementById('pf_'+f);obj[f]=el?(el.value||prev[f]):prev[f];});obj.startWeight=prev.startWeight||obj.weight;d.profile[CU]=obj;setD(d);showToast('Сохранено ✅');renderProf();}
function exportData(){var blob=new Blob([JSON.stringify(getD(),null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='gym_backup_'+today()+'.json';a.click();URL.revokeObjectURL(url);showToast('Экспортировано 📤');}
function resetData(){localStorage.removeItem('gym_v5');showToast('Данные удалены');setTimeout(function(){location.reload();},800);}

function switchUser(u){CU=u;openDays={};openExs={};document.querySelectorAll('.utab').forEach(function(t){t.classList.remove('a');});document.querySelector('.utab.'+u).classList.add('a');var isHer=u==='her';document.documentElement.style.setProperty('--ac',isHer?'var(--her)':'var(--him)');document.documentElement.style.setProperty('--acl',isHer?'var(--herl)':'var(--himl)');document.documentElement.style.setProperty('--acd',isHer?'var(--herd)':'var(--himd)');renderAll();}
function gp(page,el){CP=page;document.querySelectorAll('.page').forEach(function(p){p.classList.remove('a');});document.querySelectorAll('.bni').forEach(function(b){b.classList.remove('a');});document.getElementById('pg-'+page).classList.add('a');el.classList.add('a');if(page==='plan')renderPlan();else if(page==='prog')renderProg();else if(page==='food')renderFood();else if(page==='prof')renderProf();window.scrollTo(0,0);}
function renderAll(){renderPlan();if(CP==='prog')renderProg();else if(CP==='food')renderFood();else if(CP==='prof')renderProf();}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
switchUser('him');
</script>
</body>
</html>
